name: Validate MDM Sources

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate repository
        run: node tools/validate.mjs

      - name: Run tests
        run: node --test tests/*.test.mjs
