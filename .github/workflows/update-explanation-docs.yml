name: Update Explanation Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write

concurrency:
  group: update-generated-docs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate vanilla schema explanation docs
        run: node tools/sync-vanilla-schema-docs.mjs

      - name: Generate misode generator catalog
        run: node tools/misode-generator-catalog.mjs

      - name: Generate version change docs
        run: node tools/sync-version-change-docs.mjs

      - name: Generate loader documentation
        run: node tools/sync-loader-docs.mjs

      - name: Validate repository
        run: node tools/validate.mjs

      - name: Build release artifacts without registry mutation
        # Covers vanilla-schema-docs, misode-generator-catalog, minecraft-version-changes, and minecraft-loader-docs.
        run: node tools/build-local-release.mjs --out release-out --no-registry-update --channel docs

      - name: Commit generated docs updates
        run: |
          if git diff --quiet; then
            echo "No generated docs changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/docs registry
          git commit -m "chore: update generated docs packages"
          git push
