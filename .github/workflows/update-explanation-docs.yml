name: Update Explanation Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate vanilla schema explanation docs
        run: node tools/sync-vanilla-schema-docs.mjs

      - name: Generate misode generator catalog
        run: node tools/misode-generator-catalog.mjs

      - name: Generate version change docs
        run: node tools/sync-version-change-docs.mjs

      - name: Validate repository
        run: node tools/validate.mjs

      - name: Build release artifacts without registry mutation
        run: node tools/build-local-release.mjs --out release-out --no-registry-update --channel docs

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update generated docs packages"
          title: "chore: update generated docs packages"
          body: |
            Automated refresh from:
            - https://github.com/SpyglassMC/vanilla-mcdoc
            - https://github.com/misode/misode.github.io
            - https://github.com/neoforged/.github/tree/main/primers
            - https://github.com/misode/technical-changes

            The generated `vanilla-schema-docs` package covers datapack and resource-pack schema explanation docs.
            The generated `misode-generator-catalog` package covers generator ids, version ranges, and path rules from misode config.
            The generated `minecraft-version-changes` packages cover version migration evidence from NeoForged primers and misode technical changelogs.
          branch: automation/update-vanilla-schema-docs
