name: Release MDM Resources

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example mdm-resources-v0.1.0
        required: true
        type: string
  push:
    tags:
      - "mdm-resources-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate repository
        run: node tools/validate.mjs

      - name: Build and accept release artifacts
        run: node tools/write-release-acceptance-report.mjs --out release-out --bundle-channel docs --bundle-channel datapack --bundle-channel resourcepack --bundle-channel mappings --bundle-channel sources

      - name: Verify release manifest
        run: |
          test -f release-out/mdm-release-manifest.json
          test -f release-out/mdm-release-summary.json
          test -f release-out/mdm-release-acceptance-report.json
          test -f release-out/mdm-release-acceptance-report.md

      - name: List release artifacts
        run: node tools/list-release-artifacts.mjs release-out/mdm-release-manifest.json > release-artifacts.txt

      - name: Write release notes
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: node tools/write-release-notes.mjs --out release-out --tag "$RELEASE_TAG"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: node tools/upload-github-release.mjs --repo "$GITHUB_REPOSITORY" --tag "$RELEASE_TAG" --manifest release-out/mdm-release-manifest.json --notes release-out/mdm-release-notes.md --clobber

      - name: Verify published release
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          MANIFEST_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/mdm-release-manifest.json"
          for attempt in 1 2 3 4; do
            if node tools/verify-live-release.mjs "$MANIFEST_URL"; then
              exit 0
            fi
            if [ "$attempt" = "4" ]; then
              break
            fi
            echo "Published release verification failed on attempt $attempt; retrying..."
            sleep 10
          done
          echo "Published release verification failed after 4 attempts."
          exit 1
